- id: NutritionAndHealth
  name: Nutrition and Health
  description: >-
    Indicators capturing the final health outcomes of food systems, encompassing nutritional status and malnutrition in all its forms, 
    including undernutrition, micronutrient deficiencies, overweight, obesity, and diet-related non-communicable diseases (HLPE, 2017).
  dimension: Health
- id: DietaryConsumptionPatternsFoodIntake
  name: Dietary consumption patterns/Food Intake
  description: >-
    Indicators describing the dietary consumption patterns refer to the quantities, proportions, and habitual combinations of foods and 
    drinks that individuals or populations.
  dimension: Health
- id: FoodQualityAndSafety
  name: Food quality and safety
  description: >-
    Indicators describing the extent to which foods meet established standards of safety and quality, including the absence of 
    biological, chemical, and physical hazards, as well as compliance with nutritional, compositional, and hygienic requirements 
    along the food chain.
  dimension: Health
- id: FoodSecurityAccessAndEnablingFactors
  name: >- 
    Food security: access and enabling factors
  description: >-
    Indicators capturing both people's ability to obtain adequate food (economic and physical access) and the broader economic, 
    infrastructural, and systemic conditions that enable or constrain such access.
  dimension: Health
- id: FoodAvailability
  name: Food availability
  description: >- 
    Indicators describing the quantity, composition, and stability of food supplied by the food system through domestic production, 
    imports, and stocks, including the supply of energy and nutrients and the productive capacity of agriculture.
  dimension: Health
- id: FoodStability
  name: Food stability
  description: >-
    Indicators describing the extent to which the availability of and access to food are maintained over time, including the 
    resilience of food supply systems to economic, climatic, and market-related shocks and variability.
  dimension: Health
