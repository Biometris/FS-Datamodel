id: https://w3id.org/linkml/examples/fsi
name: food_system_indicators
title: food systems indicators schema
description: >-
  Model for the indicators on the sustainability performance of food Systems within Europe.
prefixes:
  linkml: https://w3id.org/linkml/
  dct: http://purl.org/dc/terms/
  fsi: https://w3id.org/linkml/examples/fsi
  IAO: http://purl.obolibrary.org/obo/IAO_
  obo: http://purl.obolibrary.org/obo/
  qudt: http://qudt.org/schema/qudt/
  rdfs: http://www.w3.org/2000/01/rdf-schema#
  schema: http://schema.org/
  skos: http://www.w3.org/2004/02/skos/core#
  UO: http://purl.obolibrary.org/obo/UO_
  euunit: http://dd.eionet.europa.eu/vocabulary/eurostat/unit/
imports:
  - linkml:types
  - eurostat-unit-enums
default_range: string
default_prefix: fsi

classes:

  Entity:
    title: entity
    description: >-
      Root class for all things and informational relationships, real or imagined.
    abstract: true
    slots:
      - id
      - iri
      - name
      - description

  IndicatorCategory:
    is_a: Entity
    title: indicator category
    description: >-
      Group of indicators that share common characteristics, functions, or measurement purposes within a monitoring or 
      evaluation framework.
    slots:
      - id
      - name
      - description
      - dimension
      - driving_force
      - activity_type
      - outcome_type
      - referenced_in
    slot_usage:
      id:
        description:
          Unique identifier of the indicator category.
      name:
        description:
          Denomination of the indicator category.
      description:
        description:
          Concise text that provides the meaning of the indicator category.
      outcome_type:
        required: false

  Indicator:
    is_a: Entity
    title: indicator
    description: >-
      A quantitative measure used to assess the state, performance, or progress of a specific aspect of the food system 
      in relation to sustainability objectives.
    slots:
      - id
      - name
      - description
      - definition
      - driving_force
      - activity_type
      - outcome_type
      - supply_chain_component
      - measurement_unit_description
      - measurement_units
      - has_category
      - sustainability_impact
      - eu2025_sdg_indicator_code
      - methodology_description
    slot_usage:
      id:
        description:
          Unique identifier of the indicator.
      name:
        description:
          Denomination of the indicator.
      description:
        description:
          Concise text that provides the meaning of the identifier.
      definition:
        description:
          A precise and formal statement that defines the indicator category, explaining its scope, purpose, and distinguishing characteristics.
      methodology_description:
        description:
          The methodological approach used to compute the indicator, including formulas, assumptions.
     
  IndicatorDataCollectionDetails:
    is_a: Entity
    title: indicator data collection details
    description: >-
      Details on the collection of indicator data within a certain database/dataset.
    slots:
      - id
      - name
      - description
      - measures_indicator
      - in_database
      - oldest_datapoint
      - newest_datapoint
      - time_granularity
      - spatial_scope
      - spatial_granularity
      - data_link
    slot_usage:
      referenced_in:
        description:
          Specifies the database which the entity is part of.

  IndicatorDatapoint:
    is_a: QuantityValue
    title: indicator datapoint
    description: >-
      A food system indicator datapoint is a measured value or statistic that provides quantitative information for a specific sustainability indicator at a given time and place, used to track the performance or state of the food system.
    slots:
      - measurement_of
      - part_of_collection
    slot_usage:
      id:
        description:
          Unique identifier of the datapoint.

  QuantityValue:
    title: quantity value
    description: >-
      A value of an attribute that is quantitative and measurable, expressed as a combination of a unit and a numeric value.
    is_a: Entity
    slots:
      - has unit
      - has numeric value

  IndicatorCriterion:
    is_a: Entity
    title: indicator criterion
    description: Criterion used for indicator selection.
    slots:
      - category
      - rationale_strong
      - rationale_adequate
      - rationale_weak

  IndicatorcriteriaScore:
    title: indicator criterion score
    description: A score assigned to an indicator based on a specific selection criterion.
    slots:
      - score_for_indicator
      - scores_criterion
      - score
      - comment

  Reference:
    is_a: Entity
    title: reference
    description: A reference to a publication, database or dataset.
    slots:
      - link
      - reference_type
      - comment

  Database:
    is_a: Reference
    title: database
    description: A reference to a database.
    slots:
      - update_frequency     

  TransitionDomainPillar:
    is_a: Entity
    title: transition domain pillar
    description: Sub-area of a transition domain.
    slots:
      - id
      - name
      - description
      - transition_domain

## --------------------
## SLOTS
## --------------------

slots:
  node property:
    description: >-
      A grouping for any property that holds between a node and a value.
    domain: Entity

  description:
    range: narrative_text
    description: >-
      A human-readable description of an entity.
    slot_uri: dct:description
    exact_mappings:
      - IAO:0000115
      - skos:definitions

  definition:
    range: narrative_text
    description: >-
      A (precise) formal definition.

  methodology_description:
    range: narrative_text
    description: >-
      A description a methodological approach used to compute an indicator, including assumptions and formulas.

  comment:
    range: narrative_text
    description:
      A comment about an entity.

  has numeric value:
    description: >-
      connects a quantity value to a number
    domain: QuantityValue
    range: double
    multivalued: false
    exact_mappings:
      - qudt:quantityValue

  has unit:
    description: >-
      connects a quantity value to a unit
    domain: QuantityValue
    range: unit
    multivalued: false
    exact_mappings:
      - qudt:unit
      - IAO:0000039

  id:
    identifier: true
    domain: Entity
    description: >-
      A unique identifier for an entity.
    required: true

  iri:
    description: >-
      An IRI for an entity. This is determined by the id using expansion rules.
    range: iri_type

  measurement_of:
    title: measurement of
    is_a: node property
    range: Indicator
    required: true
    description:
      Indicator.

  part_of_collection:
    title: part of collection
    is_a: node property
    range: IndicatorDataCollectionDetails
    required: true
    description:
      Data collection which this measurement is part of.

  measures_indicator:
    is_a: node property
    title: measures indicator
    description:
      Indicator.
    range: Indicator
    required: true

  in_database:
    is_a: node property
    title: in database
    description:
      Specifies the database which the entity is part of.
    range: Database
    required: true

  has_category:
    is_a: node property
    title: indicator category
    description: 
      Group of indicators that share common characteristics, functions, or measurement purposes within a monitoring or evaluation framework.
    range: IndicatorCategory
    required: true

  referenced_in:
    is_a: node property
    title: referenced in
    description: >-
      Reference to the source of the definition of entity.
    range: Reference
    multivalued: true

  sustainability_impact:
    title: sustainability impact
    description:
      Description of the sustainability impact the indicator measures.
    range: SustainabilityImpactType

  score_for_indicator:
    is_a: node property
    title: score for indicator
    description:
      Indicator.
    range: Indicator

  scores_criterion:
    is_a: node property
    title: scores criterion
    description:
      Indicator criterion.
    range: IndicatorCriterion

  name:
    title: name
    aliases: ['label', 'display name', 'title']
    description: >-
      A human-readable name for an attribute or entity.
    domain: Entity
    range: label_type
    slot_uri: rdfs:label
    narrow_mappings:
      - dct:title

  activity_type:
    title: food system activity
    description:
      A reference to the food system activity that is the subject of this indicator's measurement.
    required: false
    range: FoodSystemActivityType

  dimension:
    title: dimension
    description: >-
      Reference to the dimension that the indicator belongs to.
    required: true
    range: SustainabilityDimension

  driving_force:
    title: food system driving force
    description:
      A reference to the food system driving force that is the subject of this indicator's measurement.
    required: false
    range: FoodSystemActivityType

  outcome_type:
    title: outcome type
    description: >-
      Reference to the type of the outcome measured by the indicator.
    required: true
    range: FoodSystemOutcomeType

  supply_chain_component:
    title: supply chain component(s)
    description: >-
      Reference to the supply chain component(s) for which the indicator is relevant.
    range: SupplyChainComponentType
    multivalued: true

  measurement_unit_description:
    title: unit(s) of measurement description
    description: >-
      Textual description of the indicator unit of measurement.
    range: unit

  measurement_units:
    title: units of measurement
    range: IndicatorMeasurementUnit
    description: >-
      Indicator unit(s) of measurement.
    multivalued: true

  eu2025_sdg_indicator_code:
    title: EU (2025) SDG indicator code
    description:
      Indicates whether the indicator is included in the 2025 edition of the EU Sustainable Development Goals indicator set, and provides the corresponding EU SDG indicator code.
    range: Eu2025SdgIndicator
    multivalued: true
    required: false

  link:
    title: link
    description:
      Link.
    range: iri_type

  data_link:
    title: data link
    description:
      Link to the data for the indicator.
    range: iri_type

  oldest_datapoint:
    title: oldest datapoint
    description:
      Oldest datapoint for which the indicator is measured.
    range: date_or_datetime

  newest_datapoint:
    title: newest datapoint
    description:
      Newest datapoint for which the indicator is measured.
    range: date_or_datetime

  time_granularity:
    title: time granularity between the datapoints.
    description:
      Time granularity between the datapoints.
    range: TimeGranularity

  spatial_granularity:
    title: spatial resolution of the (collected) datapoints
    description:
      Spatial granularity/resolution of the datapoints.
    range: SpatialGranularity

  spatial_scope:
    title: spatial scope of the data collection
    description:
      Spatial scope of the data collection.
    range: SpatialScopeType

  update_frequency:
    title: frequency at which the data is updated
    description:
      Frequency at which the data is updated.
    range: TimeGranularity

  category:
    title: category
    description: category for the indicator selection criterion.
    range: CriterionCategory

  score:
    title: score
    description: score for an indicator selection criterion for an indicator.
    range: ScoreCategory

  reference_type:
    title: reference type
    description: Type of reference.
    range: ReferenceType

  rationale_strong:
    title: rationale strong
    range: narrative_text
    description: >-
      Rationale for a strong score for the indicator.

  rationale_adequate:
    title: rationale adequate
    range: narrative_text
    description: >-
      Rationale for an adequate score for the indicator.

  rationale_weak:
    title: rationale weak
    range: narrative_text
    description: >-
      Rationale for a weak score for the indicator.

  transition_domain:
    title: transition domain
    range: TransitionDomain

## --------------------
## TYPES
## --------------------

types:
  iri_type:
    uri: xsd:string
    typeof: uriorcurie
    description: >-
      An IRI

  label_type:
    uri: xsd:string
    typeof: string
    description: >-
      A string that provides a human-readable name for an entity.

  narrative_text:
    uri: xsd:string
    typeof: string
    description: >-
      A string that provides a human-readable description of something.

  unit:
    typeof: string
    uri: UO:0000000
    id_prefixes:
      - UO
    exact_mappings:
      - qudt:Unit

## --------------------
## ENUMS
## --------------------

enums:
  SustainabilityDimension:
    title: sustainability dimension
    description: >-
      A dimension of sustainability to which the indicator relates.
    permissible_values:
      Environment:
        title: environment
        description:
          TODO
      Economy:
        title: economy
        description:
          TODO
      Society:
        title: society
        description:
          TODO
      Health:
        title: health
        description:
          TODO

  FoodSystemActivityType:
    title: food system activity
    description: >-
      Food systems encompass  activities related to the food supply chains,  food environments, and food demand, as well as the use of natural resource, consumption and diets, and waste, by-products and recycling. These ultimately have an effect on  food system outcomes.
    permissible_values:
      FoodSupply:
        title: food supply
        description:
          This includes activities across the food value chain, incl.  activities from post-harvest and processing to packaging, distribution, and retail. The food value chain operates within an enabling environment that provides the necessary conditions for its functioning, including transport infrastructure. Additionally, the food supply chain is supported by a range of business services that offer goods and services to actors within the chain, such as training, agricultural inputs, technical support, and financial services.
      FoodEnvironment:
        title: food environment
        description:
          The food environment can be understood as the physical and social environment that affects what people eat. It refers to the settings and conditions in which individuals engage with the food system to obtain and consume food. It also includes the broader social, economic, and cultural contexts that shape food choices. It includes, among others, factors such as food accessibility, availability, pricing, properties, marketing, and messaging. It covers various settings such as supermarkets, hospitality/catering, shops/retail, and out-of-home settings. Furthermore, distinctions can be made between urban and rural areas, which have for instance different distances to supermarkets and therefore access to food.
      FoodDemand:
        title: food demand
        description:
          Addresses consumer behaviour and consumer characteristics, incl. consumer preferences. Consumer characteristics can refer to attributes such as knowledge, available time, resources (purchasing power), age, sex, culture, religion, etc. Through these characteristics, consumers develop certain preferences that influence their food choices. It considers various groups (e.g., socioeconomic, demographic, etc.), along with their norms, values, and levels of food literacy.
      UseNaturalResources:
        title: use of natural resources
        description:
          This refers to the direct use of natural resources and materials that are required to support the food chain, including, among others, inputs such as water, land, crops minerals, fertilisers, energy sources, and packaging materials, among others. These resources are used across the different food supply and food environment.
      ConsumptionAndDiets:
        title: consumption and diets
        description:
          This covers food consumption and diets, for total populations, vulnerable groups. Consumption and diets are a result of the food supply, food environment,  and food demand.  It covers, among others, total diets and consumption, including for instance  amount of meat consumption, FBDG, consumption patterns. 

  FoodSystemOutcomeType:
    title: food system outcome
    description: >-
      Food system outcomes, being impact related to environment, economic, social and health,  are a result of food systems. This framework distinguishes five different type of food system impacts: environmental, economic, social, health, and the overarching food security and resilience.
    permissible_values:
      Environment:
        title: environmental impacts
        description:
          This covers the impact on natural resources and the biophysical drivers of the food system. It includes, among others, the impact on climate change, biodiversity loss, land, soils, use of (micro)minerals and water. It may also include an assessment against the planetary boundary framework.
      Economy:
        title: economic impacts
        description:
          Social impacts encompass the outcomes resulting from the interactions between society and the food system. It includes, among others, indicators related to employment and animal welfare, among others.
      Society:
        title: societal impacts
        description:
          Social impacts encompass the outcomes resulting from the interactions between society and the food system. It includes, among others, indicators related to employment and animal welfare, among others.
      Health:
        title: health impacts
        description:
          Health impacts from especially  diets. It includes, among others, indicators related to food safety, burden of disease, number of noncommunicable diseases (NCDs) related to diets, adherence to food-based dietary guidelines (FBDGs), among others.
      FoodSecurity:
        title: food security
        description:
          Food security refers to the availability, accessibility (food affordability), and utilisation of sufficient, safe, and nutritious food that meets dietary needs and food preferences for an active and healthy life, for all people, now and in the future. It encompasses the environmental, economic, social and health outcomes.
      Resilience:
        title: resilience 
        description:
          Resilience refers to the capacity of food systems to withstand, adapt to, and recover from shocks and stresses (e.g. climate change, economic crises, conflict), while continuing to function in a sustainable and equitable way. It includes the structural conditions, policies, and governance mechanisms that enable stable and healthy food supplies now and in the future. A resilient food system provides food that is ecologically sustainable, socially just, and economically viable. It ensures continued access to healthy food for all, supports sustainable production and consumption patterns, and strengthens the ability of communities and institutions to cope with uncertainty and long-term change.

  FoodSystemDrivingForce:
    title: food system driving force
    description:
      Driving forces can be understood as influential forces of changes that are shaping, or that have the capacity to shape or transform, a system. The driving forces stem from the DESTEP, which is an acronym that encompasses the dimensions of demographics, economic, social-cultural, technological, environmental, and political-institutional factors, are often used as a method for identification of driving forces and trends. 
    permissible_values:
      Demography:
        title: demography
        description: >-
          Demographic trends involve population characteristics such as population composition, growth and size, and educational attainment.  
      Economy:
        title: economy
        description: >-
          Economic developments involve characteristics of the economy and the labour market, such as economic growth, job structures, employment and unemployment.
      SocioCultural:
        title: socio-cultural
        description: >-
          Socio-cultural developments involve characteristics of society, such as quality of life, social cohesion and the relationship between citizens and the government, changing norms and values and a changing role/attitude of citizens 
      Technology:
        title: technology
        description: >-
          Technological developments involve developments and innovations in technology, for example in data-driven technology, artificial intelligence (AI), digitisation, genetic engineering, precision medicine and robots/cobots.  
      Ecology:
        title: ecology
        description: >-
          Ecological developments refer to features of the physical environment, such as climate change, air, water and soil pollution and the increase of renewable energy.  
      PoliticalInstitutional:
        title: political-institutional
        description: >-
          Changes, adjustments or reforms in the organisation, functioning and structures of political and administrative institutions within a society. This includes processes related to the organisation of public bodies, the system of governance, power relations, legal frameworks, democratic rules of the game, and the way decision-making takes place at national, European and global levels. 

  SpatialScopeType:
    title: spatial scope type
    description: >-
      The spatial scope for which the indicator is defined.
    permissible_values:
      Global:
        title: global
        description:
          Global.
      Eu:
        title: EU wide
        description:
          EU wide.
      EuMemberStates:
        title: EU member states
        description:
          EU member states.
      Regional:
        title: regional
        description:
          Regional.
      Local:
        title: local
        description:
          Local.

  SupplyChainComponentType:
    title: supply chain component type
    description: >-
      The supply chain component for which the indicator is relevant.
    permissible_values:
      PrimaryProduction:
        title: primary food production
        description:
          Primary food production.
      FoodProcessing:
        title: food processing
        description:
          Food processing.
      Consumption:
        title: consumption
        description:
          Consumption.
      Retail:
        title: retail
        description:
          Retail.
      Transport:
        title: transport
        description:
          Transport.
      DisposalRecycling:
        title: disposal & recycling
        description:
          Disposal and recycling.

  TimeGranularity:
    title: time granularity
    description: >-
      Time granularity for measuring and updating data.
    permissible_values:
      EveryTwoYears:
        description:
          Every 2 years.
      Yearly:
        description:
          Yearly.
      Monthly:
        description:
          Monthly.
      Weekly:
        description:
          Weekly.
      Other:
        description:
          Other.

  SpatialGranularity:
    title: spatial granularity
    description: >-
      The granularity for which the indicator is measured.
    permissible_values:
      MacroRegions:
        title: macro regions
        description: >-
          Macro regions
      Country:
        title: country
        description: >-
          Measurements at the country level.
      NUTS1:
        title: NUTS1
        description: >-
          Measurements at NUTS1 level (i.e., the first level administrative division of countries for statistical purposes).
      NUTS2:
        title: NUTS2
        description: >-
          Measurements at NUTS2 level (i.e., the second level administrative division of countries for statistical purposes).
      NUTS3:
        title: NUTS3
        description: >-
          Measurements at NUTS2 level (i.e., the third level administrative division of countries for statistical purposes).
      LAU:
        title: LAU
        description: >-
          Local administrative units

  CriterionCategory:
    title: criterion category
    description: Category of an indicator selection criterion.
    permissible_values:
      CoherenceOnFramework:
        title: coherence on framework
        description: >-
          Ensure a coherent and comprehensive representation of the food system.
      GoalOrientedAndPolicyRelevant:
        title: goal alignment, transition monitoring and decision-usefulness
        description:
          Ensure indicators align with sustainability goals, SRIA objectives, and support clear, actionable decision-making.
      SoundMethodologies:
        title: sound methodologies
        description:
          To ensure indicators are reliable, comparable, and scientifically validated, supporting cross-country comparisons and integration into global frameworks, data interoperability, adherence to FAIR principles to improve data accessibility and usability.
      GeographicalCoverageAndTimeliness:
        title: Geographical coverage and timeliness
        description: >-
          To ensure that indicators are based on accessible, interoperable, geographically comprehensive, and timely data that support effective and informed monitoring.

  ScoreCategory:
    title: score category
    description:
      Score category.
    permissible_values:
      Weak:
        description:
          Weak.
      Adequate:
        description:
          Adequate.
      Strong:
        description:
          Strong.

  SustainabilityImpactType:
    title: sustainability impact type
    description: >-
      The type of sustainability impact the indicator measures.
    permissible_values:
      Positive:
        title: positive
        description: Positive impact on sustainability.
      Negative:
        title: negative
        description: Negative impact on sustainability.
      Undefined:
        title: undefined
        description: Undefined impact on sustainability.

  TransitionDomain:
    title: transition domain
    description:
      Transition domains represent key thematic areas for research and innovation (R&I) to drive systemic change towards sustainable food systems.
    permissible_values:
      Area_1:
        title: change the way we eat
        description: >-
          Area 1 focuses on shifting food environments and consumer behaviour to promote sustainable consumption of safe, healthy, nutritious, affordable, accessible, equitable and culturally acceptable tasteful foods while tackling malnutrition in all its forms.
      Area_2:
        title: change the way we process & supply
        description: >-
          Area 2 focuses on reorienting activities of post farming and post fishing food producers (focus: industrial processing and supplying) with the aim of increasing diversity of healthy, safe, affordable and accessible products based on sustainable production.
      Area_3:
        title: change the way we connect
        description: >-
          Area 3 focuses on enhancing the way consumers engage with and trust food systems by increasing trust and transparency, diversity in consumer engagement, and food democracy with the goal of reshaping food systems to be more inclusive, participatory, and sustainable.
      Area_4:
        title: change the way we govern
        description: >-
          Area 4 focuses on fostering governance for a positive food system transformation in an interaction among the public sector, private sector, civil society, and consumers to identify, implement, resource, and monitor solutions for achieving healthy, sustainable, resilient, just, and equitable food systems without leaving anyone behind.

  Eu2025SdgIndicator:
    title: EU SDG indicators
    description: Indicators of the 2025 edition of the EU sustainable development goals (SDG) monitoring report.
    see_also:
      - https://ec.europa.eu/eurostat/web/sdi/quality
      - https://ec.europa.eu/eurostat/documents/276524/16797281/EU-SDG-indicator-review-report-2025.pdf
    permissible_values:
      EU_SDG_01_10:
      EU_SDG_01_10a:
      EU_SDG_01_40:
      EU_SDG_02_10:
      EU_SDG_02_20:
      EU_SDG_02_30:
      EU_SDG_02_40:
      EU_SDG_02_60:
      EU_SDG_02_53:
      EU_SDG_08_10:
      EU_SDG_06_40:
      EU_SDG_06_60:
      EU_SDG_08_30:
      EU_SDG_15_42:
      EU_SDG_15_50:

  ReferenceType:
    title: Reference types
    description: >-
      The type of source that a reference refers to.
    permissible_values:
      Database:
        title: database
        description: Database.
      Dataset:
        title: dataset
        description: Dataset.
      Publication:
        title: publication
        description: Publication.
